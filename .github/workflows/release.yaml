name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: arsenic-linux-x86_64.tar.gz
            binary: arsenic

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: arsenic-macos-x86_64.tar.gz
            binary: arsenic

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: arsenic-macos-aarch64.tar.gz
            binary: arsenic

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: arsenic-windows-x86_64.zip
            binary: arsenic.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/arsenic
          cp README.md LICENSE dist/ 2>/dev/null || true
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/arsenic.exe"
          if (Test-Path README.md) { Copy-Item README.md dist/ }
          if (Test-Path LICENSE) { Copy-Item LICENSE dist/ }
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}